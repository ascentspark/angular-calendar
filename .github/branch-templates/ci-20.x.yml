# TEMPLATE — not an active workflow. When the `20.x` maintenance line is cut,
# copy this to `.github/workflows/ci.yml` ON THE `20.x` BRANCH (replacing main's).
# Its check name is `Angular 20` so it can be required independently in the ruleset.
# Node 20: Angular 20 supports Node ^20.11 || ^22; pinned to 20 for the maintenance line.
name: CI

on:
  push:
    branches: ['20.x']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Angular 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx ng build angular-calendar
      - run: node scripts/check-bundle-size.mjs
      - run: TZ=UTC npx ng test angular-calendar --watch=false
      - run: TZ=America/New_York npx ng test angular-calendar --watch=false
      - run: npx ng lint
      - run: npx ng build demo
