name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx ng build angular-calendar
      - run: TZ=UTC npx ng test angular-calendar --watch=false
      - run: TZ=America/New_York npx ng test angular-calendar --watch=false
      - run: npx ng lint
