# CI for the 22.x line (this is `main`). Each maintenance branch (21.x, 20.x)
# carries its own copy of this file with its job renamed to `Angular 21` / `Angular 20`
# and `node-version` set to that line's Node — so every line is gated by a distinct,
# requireable check. See docs/REPO-HARDENING.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Angular 22
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx ng build angular-calendar
      - run: node scripts/check-bundle-size.mjs
      - run: TZ=UTC npx ng test angular-calendar --watch=false
      - run: TZ=America/New_York npx ng test angular-calendar --watch=false
      - run: npx ng lint
      - run: npx ng build demo
