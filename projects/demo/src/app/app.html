<header class="site-header">
  <a class="brand" routerLink="/" (click)="closeMenu()">
    <span class="brand__mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="17" rx="2" />
        <path d="M3 9h18M8 2v4M16 2v4" />
      </svg>
    </span>
    <span class="brand__text">
      <strong>angular-calendar</strong>
      <small>Signals-first calendar &amp; scheduler for Angular</small>
    </span>
  </a>

  <div class="site-header__actions">
    <a
      class="maintainer"
      href="https://ascentspark.com"
      target="_blank"
      rel="noopener"
      aria-label="By Ascentspark"
    >
      <img src="asc-logo-full.svg" alt="Ascentspark" />
    </a>
    <a
      class="ghost-btn"
      href="https://github.com/ascentspark/angular-calendar"
      target="_blank"
      rel="noopener"
      >GitHub</a
    >
    <a
      class="ghost-btn"
      href="https://www.npmjs.com/package/@ascentsparksoftware/angular-calendar"
      target="_blank"
      rel="noopener"
      >npm</a
    >
    <button
      type="button"
      class="icon-btn"
      [attr.aria-pressed]="dark()"
      aria-label="Toggle dark mode"
      (click)="toggleDark()"
    >
      {{ dark() ? '☀' : '☾' }}
    </button>
    <button
      type="button"
      class="icon-btn nav-toggle"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Toggle navigation"
      (click)="menuOpen.set(!menuOpen())"
    >
      ☰
    </button>
  </div>
</header>

<div class="site-layout">
  <aside class="site-nav" [class.site-nav--open]="menuOpen()">
    <nav aria-label="Documentation">
      @for (group of nav; track group.title) {
        <div class="nav-group">
          <p class="nav-group__title">{{ group.title }}</p>
          <ul>
            @for (item of group.items; track item.path) {
              <li>
                <a
                  [routerLink]="'/' + item.path"
                  routerLinkActive="nav-link--active"
                  [routerLinkActiveOptions]="{ exact: item.path === '' }"
                  (click)="closeMenu()"
                  >{{ item.label }}</a
                >
              </li>
            }
          </ul>
        </div>
      }
    </nav>
    <div class="nav-footer">
      <a href="https://ascentspark.com" target="_blank" rel="noopener" aria-label="Ascentspark">
        <img src="asc-logo-full.svg" alt="Ascentspark" />
      </a>
      <span>MIT · built by Ascentspark</span>
    </div>
  </aside>

  <main class="site-main">
    <router-outlet />
  </main>
</div>
