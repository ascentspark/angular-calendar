<main class="page" [class.page--dark]="mode() === 'dark'">
  <header class="page__bar">
    <h1 class="page__title">angular-calendar — month view</h1>
    <div class="page__controls">
      <button type="button" class="btn" (click)="toggleMode()" data-testid="toggle-mode">
        {{ mode() === 'light' ? '🌙 Dark' : '☀️ Light' }}
      </button>
    </div>
  </header>

  <section class="page__demo" data-testid="month-demo">
    <cal-month-view
      [events]="events"
      [viewDate]="viewDate"
      [today]="today"
      [themeMode]="mode()"
      [accentColor]="accent()"
      [statusColors]="statusColors"
      [maxLanes]="4"
    />
  </section>
</main>
