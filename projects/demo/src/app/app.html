<main class="page" [class.page--dark]="mode() === 'dark'">
  <header class="page__bar">
    <h1 class="page__title">angular-calendar</h1>
    <div class="page__controls">
      <div class="seg" role="group" aria-label="View">
        <button type="button" class="seg__btn" [class.seg__btn--on]="view() === 'month'" (click)="setView('month')" data-testid="view-month">Month</button>
        <button type="button" class="seg__btn" [class.seg__btn--on]="view() === 'week'" (click)="setView('week')" data-testid="view-week">Week</button>
        <button type="button" class="seg__btn" [class.seg__btn--on]="view() === 'day'" (click)="setView('day')" data-testid="view-day">Day</button>
        <button type="button" class="seg__btn" [class.seg__btn--on]="view() === 'timeline'" (click)="setView('timeline')" data-testid="view-timeline">Timeline</button>
        <button type="button" class="seg__btn" [class.seg__btn--on]="view() === 'agenda'" (click)="setView('agenda')" data-testid="view-agenda">Agenda</button>
        <button type="button" class="seg__btn" [class.seg__btn--on]="view() === 'year'" (click)="setView('year')" data-testid="view-year">Year</button>
      </div>
      <button type="button" class="btn" (click)="toggleMode()" data-testid="toggle-mode">
        {{ mode() === 'light' ? '🌙 Dark' : '☀️ Light' }}
      </button>
    </div>
  </header>

  <section class="page__demo" data-testid="calendar-demo">
    @switch (view()) {
      @case ('month') {
        <cal-month-view
          [events]="events"
          [viewDate]="viewDate"
          [today]="today"
          [themeMode]="mode()"
          [accentColor]="accent()"
          [statusColors]="statusColors"
          [maxLanes]="4"
        />
      }
      @case ('week') {
        <cal-time-grid
          [events]="events"
          [viewDate]="viewDate"
          [today]="today"
          [now]="now"
          [days]="7"
          [anchorToWeek]="true"
          [dayStartMinutes]="360"
          [dayEndMinutes]="1320"
          [themeMode]="mode()"
          [accentColor]="accent()"
          [statusColors]="statusColors"
        />
      }
      @case ('day') {
        <cal-time-grid
          [events]="events"
          [viewDate]="viewDate"
          [today]="today"
          [now]="now"
          [days]="1"
          [anchorToWeek]="false"
          [dayStartMinutes]="0"
          [dayEndMinutes]="1440"
          [themeMode]="mode()"
          [accentColor]="accent()"
          [statusColors]="statusColors"
        />
      }
      @case ('timeline') {
        <cal-timeline-view
          [events]="jobs"
          [resources]="resources"
          [viewDate]="viewDate"
          [today]="today"
          [now]="now"
          [days]="1"
          [dayStartMinutes]="420"
          [dayEndMinutes]="1260"
          [headerGroupings]="['day', 'hour']"
          [hourWidth]="80"
          [themeMode]="mode()"
          [accentColor]="accent()"
          [statusColors]="statusColors"
        />
      }
      @case ('agenda') {
        <cal-agenda-view
          [events]="events"
          [viewDate]="viewDate"
          [today]="today"
          [days]="10"
          [themeMode]="mode()"
          [accentColor]="accent()"
          [statusColors]="statusColors"
        />
      }
      @case ('year') {
        <cal-year-view
          [events]="events"
          [viewDate]="viewDate"
          [today]="today"
          [themeMode]="mode()"
          [accentColor]="accent()"
          [statusColors]="statusColors"
        />
      }
    }
  </section>
</main>
